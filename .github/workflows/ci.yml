name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Syntax Check
        run: |
          for f in $(find src -name "*.js"); do
            node -c "$f"
          done

      - name: Smoke Test
        run: npm run smoke

      - name: Package Dry Run
        run: npm run pack:dry-run
